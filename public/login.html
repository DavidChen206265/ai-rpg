<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI RPG - Login</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" type="image/x-icon" href="\imgs\favicon.png">
</head>
<body>
  <main class="page-shell narrow-shell">
    <header class="page-header">
      <h1>Account</h1>
      <nav class="page-actions">
        <a class="button-link" href="/">Home</a>
      </nav>
    </header>

    <div class="panel auth-panel">
      <div class="auth-tabs">
        <button id="tab-login" class="tab-button is-active" type="button">Login</button>
        <button id="tab-register" class="tab-button" type="button">Register</button>
      </div>

      <form id="auth-form" class="auth-form">
        <label>
          Username
          <input id="auth-username" type="text" autocomplete="username">
        </label>
        <label>
          Password
          <input id="auth-password" type="password" autocomplete="current-password">
        </label>
        <button id="auth-submit" type="submit">Login</button>
      </form>

      <p id="auth-message" class="status-text"></p>
    </div>
  </main>

  <script src="/login.js"></script>
</body>
</html>
