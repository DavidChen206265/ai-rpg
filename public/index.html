<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

   <!-- update the version here before committing to github to check auto deploy  -->
  <title>AI RPG - Home (v0.14)</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="page-shell">
    <header class="page-header">
      <h1>AI RPG</h1>
      <nav class="page-actions">
        <a id="auth-action" class="button-link" href="/login">Login / Register</a>
        <a id="new-chat" class="button-link" href="/chat">New Chat</a>
      </nav>
    </header>

    <section class="panel">
      <div class="panel-head">
        <h2>Chat Records</h2>
        <button id="refresh-saves" type="button">Refresh</button>
      </div>
      <div id="save-list" class="save-list">
        <p class="empty-state">Please log in to create or load saves.</p>
      </div>
    </section>
  </main>

  <script src="/home.js"></script>
</body>
</html>
