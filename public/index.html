<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#14141a">

  <title>AI RPG - Home</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" type="image/png" href="/imgs/favicon.png">
  <link rel="apple-touch-icon" href="/imgs/icons/icon-192.png">
  <script defer src="/pwa.js"></script>
</head>
<body style="background-image: url(/imgs/stonewall.jpg)">
  <main class="page-shell">
    <header class="page-header">
      <h1>AI RPG</h1>
      <nav class="page-actions">
        <a id="auth-action" class="button-link stone-border" href="/login.html">Login / Register</a>
      </nav>
    </header>

    <div id="start-panel">
      <div id="paper" class="paper-torn">
      <p>Start Your Adventure!</p>
      <a id="new-chat" class="button-link stone-border" href="/chat.html">New Game</a>
      </div>
    </div>

    <section class="panel stone-border">
      <div class="panel-head">
        <h2>Chat Records</h2>
        <button id="refresh-saves" type="button" class="stone-border">Refresh</button>
      </div>
      <div id="save-list" class="save-list">
        <p class="empty-state">Please log in to create or load saves.</p>
      </div>
    </section>
  </main>

  <script src="/home.js"></script>
</body>
</html>
