<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hello World</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

    <div id="chat-window">Connecting...</div>

    <div class="input-group">
        <button onclick="applyChoice('buttonOne')" id="buttonOne">choice one</button>
        <button onclick="applyChoice('buttonTwo')" id="buttonTwo">choice two</button>
        <button onclick="applyChoice('buttonThree')" id="buttonThree">choice three</button>
        <input type="text" id="userInput" placeholder="Enter Action" onkeypress="checkEnter(event)">
        <button onclick="sendMessage()" id="buttonSend">Send</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/client.js"></script>
</body>
</html>
